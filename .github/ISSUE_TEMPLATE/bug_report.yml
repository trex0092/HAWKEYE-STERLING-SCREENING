name: Bug report
description: Report a problem so we can fix it
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug! Please fill out the details below.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug and what you expected instead.
      placeholder: When I click X, Y happens, but I expected Z.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true
  - type: input
    id: env
    attributes:
      label: Environment
      description: Browser, OS, Node version, etc.
      placeholder: Chrome 124, macOS 14, Node 22
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs / console output
      render: shell
    validations:
      required: false
