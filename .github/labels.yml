# Canonical label set for the repository, synced by the "Sync labels" workflow.
# Keeping labels in version control makes triage consistent and reviewable.

# --- Type -------------------------------------------------------------------
- name: bug
  color: d73a4a
  description: Something isn't working
- name: enhancement
  color: a2eeef
  description: New feature or request
- name: documentation
  color: 0075ca
  description: Improvements or additions to documentation
- name: refactor
  color: fbca04
  description: Code change that neither fixes a bug nor adds a feature
- name: test
  color: bfdadc
  description: Adding or improving tests

# --- Area -------------------------------------------------------------------
- name: "area: ci"
  color: ededed
  description: Continuous integration, workflows, and tooling
- name: "area: dependencies"
  color: ededed
  description: Dependency and lockfile changes
- name: "area: docs"
  color: ededed
  description: Documentation and governance files
- name: "area: app"
  color: ededed
  description: Application source (src/)

# --- Dependencies -----------------------------------------------------------
- name: dependencies
  color: 0366d6
  description: Pull requests that update a dependency file
- name: github-actions
  color: "000000"
  description: GitHub Actions dependency updates

# --- Workflow / triage ------------------------------------------------------
- name: good first issue
  color: 7057ff
  description: Good for newcomers
- name: help wanted
  color: 008672
  description: Extra attention is needed
- name: in-progress
  color: 0e8a16
  description: Actively being worked on
- name: pinned
  color: "5319e7"
  description: Exempt from stale automation
- name: security
  color: b60205
  description: Security-related; exempt from stale automation
- name: stale
  color: "795548"
  description: No recent activity; scheduled for auto-close
- name: wontfix
  color: ffffff
  description: This will not be worked on
