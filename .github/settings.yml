# Repository configuration as code.
# Applied by the GitHub "Repository Settings" app: https://github.com/apps/settings
# If the app is not installed, this file documents the intended settings so they
# can be applied manually and reviewed like any other change.

repository:
  name: HAWKEYE-STERLING-SCREENING
  description: >-
    A compliance & sanctions screening console (offline demo build) —
    Next.js, TypeScript, Tailwind.
  homepage: https://github.com/trex0092/HAWKEYE-STERLING-SCREENING#readme
  topics: compliance, sanctions-screening, kyc, aml, nextjs, typescript, react
  has_issues: true
  has_projects: false
  has_wiki: false
  has_discussions: true
  default_branch: main
  allow_squash_merge: true
  allow_merge_commit: true
  allow_rebase_merge: true
  allow_auto_merge: true
  delete_branch_on_merge: true

# Branch protection for the default branch. Requires reviews and green CI.
branches:
  - name: main
    protection:
      required_pull_request_reviews:
        required_approving_review_count: 1
        require_code_owner_reviews: true
        dismiss_stale_reviews: true
      required_status_checks:
        strict: true
        contexts:
          - "Type-check, lint & build"
          - "Playwright (Chromium)"
          - "Analyze (javascript-typescript)"
          - "Review dependency changes"
      enforce_admins: false
      required_linear_history: false
      required_conversation_resolution: true
      restrictions: null
