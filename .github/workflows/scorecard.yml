name: OpenSSF Scorecard

# Supply-chain security posture analysis (OpenSSF Scorecard). Publishes results
# to the Security → Code scanning tab and to the public Scorecard API so the
# repository can display a Scorecard badge.
on:
  branch_protection_rule:
  schedule:
    - cron: "23 5 * * 2"
  push:
    branches: [main]

# Least-privilege by default; the job below elevates only what it needs.
permissions: read-all

concurrency:
  group: scorecard-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Run analysis
        uses: ossf/scorecard-action@v2
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SARIF file
          path: results.sarif
          retention-days: 5

      - name: Upload to code-scanning
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif
