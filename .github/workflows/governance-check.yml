name: Governance check

# Fails if any required governance / community-health file is removed, keeping
# the compliance baseline enforced. Hermetic — no network, no dependencies.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: governance-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify required governance files
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: 22

      - name: Check governance files
        run: node scripts/check-governance.mjs
