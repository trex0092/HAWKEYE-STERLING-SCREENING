name: Governance check

# Fails if any required governance / community-health file is removed, keeping
# the compliance baseline enforced. Hermetic — no network, no dependencies.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: governance-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify required governance files
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22

      - name: Check governance files
        run: node scripts/check-governance.mjs
