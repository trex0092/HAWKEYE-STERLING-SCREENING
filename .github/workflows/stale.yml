name: Stale issues & PRs

# Keeps the backlog honest: warns on inactivity, then closes if there is still
# no response. Security items and anything explicitly pinned are exempt.
on:
  schedule:
    - cron: "30 1 * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: stale
  cancel-in-progress: true

jobs:
  stale:
    name: Mark and close stale items
    runs-on: ubuntu-latest
    steps:
      - name: Run stale bot
        uses: actions/stale@1e223db275d687790206a7acac4d1a11bd6fe629 # v10.4.0
        with:
          days-before-stale: 60
          days-before-close: 14
          stale-issue-label: stale
          stale-pr-label: stale
          exempt-issue-labels: "pinned,security,in-progress"
          exempt-pr-labels: "pinned,security,in-progress"
          exempt-all-milestones: true
          stale-issue-message: >
            This issue has been automatically marked as stale because it has had
            no activity for 60 days. It will be closed in 14 days if no further
            activity occurs. If it is still relevant, please add a comment.
          close-issue-message: >
            This issue was closed because it has been stale for 14 days with no
            activity. Feel free to reopen it if it is still relevant.
          stale-pr-message: >
            This pull request has been automatically marked as stale because it
            has had no activity for 60 days. It will be closed in 14 days if no
            further activity occurs.
          close-pr-message: >
            This pull request was closed because it has been stale for 14 days
            with no activity. Feel free to reopen it when you are ready to
            continue.
