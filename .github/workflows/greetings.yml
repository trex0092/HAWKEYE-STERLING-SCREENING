name: Greetings

# Welcomes first-time contributors with pointers to the guides they need.
#
# first-interaction needs a write token to comment on PRs opened from forks and
# does not check out or execute any PR-provided code, so this pull_request_target
# use is safe (justified suppression below).
on: # zizmor: ignore[dangerous-triggers]
  issues:
    types: [opened]
  pull_request_target:
    types: [opened]

permissions:
  contents: read

jobs:
  greeting:
    name: Greet new contributors
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - uses: actions/first-interaction@1c4688942c71f71d4f5502a26ea67c331730fa4d # v3.1.0
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          issue-message: >
            👋 Thanks for opening your first issue! Please make sure it follows
            our issue template and the Code of Conduct. A maintainer will triage
            it soon. For questions, try Discussions; for security issues, see
            SECURITY.md — do not post them publicly.
          pr-message: >
            🎉 Thanks for your first pull request! Please confirm the PR template
            checklist is complete and that CI passes (type-check, lint, format,
            tests, build). Review the Contributing Guide if you haven't yet.
            A maintainer will review shortly.
