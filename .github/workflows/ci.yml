name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Type-check, lint & build
    runs-on: ubuntu-latest
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@v2
        with:
          # Record all outbound network traffic from the job for supply-chain
          # visibility. Switch to "block" with an allow-list to enforce.
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Check formatting
        run: npm run format:check

      - name: Unit tests (with coverage)
        run: npm run test:coverage

      - name: Coverage summary
        if: ${{ !cancelled() }}
        run: |
          {
            echo "### Test coverage"
            echo ""
            echo '```'
            node -e "const s=require('./coverage/coverage-summary.json').total;for(const k of ['statements','branches','functions','lines'])console.log(k.padEnd(12),s[k].pct+'%')"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        if: ${{ !cancelled() }}
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

      - name: Build
        run: npm run build
        env:
          # Keep CI builds fast and hermetic; the screening index is built on deploy.
          SKIP_SANCTIONS_INDEX: "1"
