name: Link check

# Verifies that links in Markdown docs resolve. Non-blocking: it reports broken
# links but never fails a build (external sites can be flaky).
on:
  push:
    branches: [main]
    paths:
      - "**/*.md"
  pull_request:
    branches: [main]
    paths:
      - "**/*.md"
  schedule:
    - cron: "45 4 * * 3"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: links-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lychee:
    name: Check Markdown links
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      - name: Run lychee
        uses: lycheeverse/lychee-action@e7477775783ea5526144ba13e8db5eec57747ce8 # v2
        with:
          args: >-
            --no-progress
            --max-concurrency 4
            --accept 200,206,429
            --exclude-mail
            './**/*.md'
          fail: false
