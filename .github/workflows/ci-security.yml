name: CI security audit

# Audits the CI/CD configuration itself — the workflows are part of the attack
# surface. actionlint catches workflow bugs; zizmor audits them for security
# issues (injection, excessive permissions, dangerous triggers) and reports the
# findings in the job summary. Report-only for now; promote to gating once the
# accepted patterns (e.g. pull_request_target for fork labeling) are pinned/clean.
on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/**"
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/**"
  schedule:
    - cron: "12 5 * * 4"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  actionlint:
    name: Lint workflows (actionlint)
    runs-on: ubuntu-latest
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@v5

      - name: Run actionlint
        # Official image; report-only for now (never fails the build).
        run: docker run --rm -v "$PWD:/repo" --workdir /repo rhysd/actionlint:latest -color || true

  zizmor:
    name: Audit workflows (zizmor)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Run zizmor
        # Report-only: surface findings in the job summary; never fail the build
        # and never open code-scanning alerts for the accepted workflow patterns.
        run: |
          {
            echo '## zizmor workflow audit'
            echo ''
            echo '```'
            pipx run zizmor --offline --format plain .github/workflows/ 2>&1 || true
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
