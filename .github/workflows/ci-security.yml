name: CI security audit

# Audits the CI/CD configuration itself — the workflows are part of the attack
# surface. zizmor audits them for security issues (injection, excessive
# permissions, dangerous triggers, credential persistence) and is a BLOCKING
# gate: the run fails on any finding. Accepted patterns are annotated inline with
# `# zizmor: ignore[...]`. actionlint is an advisory workflow linter.
on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/**"
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/**"
  schedule:
    - cron: "12 5 * * 4"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  actionlint:
    name: Lint workflows (actionlint)
    runs-on: ubuntu-latest
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      - name: Run actionlint
        # Official image; report-only for now (never fails the build).
        run: docker run --rm -v "$PWD:/repo" --workdir /repo rhysd/actionlint:latest -color || true

  zizmor:
    name: Audit workflows (zizmor)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      - name: Install zizmor
        run: pipx install zizmor==1.26.1

      - name: Run zizmor (gating)
        # Fails the job on any finding. Pinned version for reproducibility.
        run: zizmor --offline .github/workflows/
