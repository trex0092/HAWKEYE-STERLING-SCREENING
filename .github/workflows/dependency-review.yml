name: Dependency Review

# Reviews pull requests for dependencies with known vulnerabilities or
# non-compliant licenses. Runs entirely on the PR diff.
#
# NOTE: This action requires the repository's **Dependency graph** feature to be
# enabled (Settings → Code security). Until it is, the action errors with
# "Dependency review is not supported on this repository". The review step is
# therefore marked `continue-on-error` so the check stays green and never blocks
# a PR on that infrastructure error. Once Dependency graph is enabled, remove the
# step's `continue-on-error` to promote this to a hard, blocking gate.
on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  dependency-review:
    name: Review dependency changes
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Dependency Review
        uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4
        continue-on-error: true # advisory until Dependency graph is enabled
        with:
          fail-on-severity: moderate
          comment-summary-in-pr: on-failure
          # Deny copyleft/network licenses incompatible with this MIT project.
          deny-licenses: AGPL-3.0, GPL-3.0, LGPL-3.0
