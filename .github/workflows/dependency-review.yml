name: Dependency Review

# Reviews pull requests for dependencies with known vulnerabilities or
# non-compliant licenses. Runs entirely on the PR diff.
#
# NOTE: This action requires the repository's **Dependency graph** feature to be
# enabled (Settings → Code security). Until it is, the action errors with
# "Dependency review is not supported on this repository". The job is therefore
# marked `continue-on-error` so it stays advisory and never blocks a PR on that
# infrastructure error. Once Dependency graph is enabled, remove
# `continue-on-error` to promote this back to a hard, blocking gate.
on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  dependency-review:
    name: Review dependency changes
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: moderate
          comment-summary-in-pr: on-failure
          # Deny copyleft/network licenses incompatible with this MIT project.
          deny-licenses: AGPL-3.0, GPL-3.0, LGPL-3.0
