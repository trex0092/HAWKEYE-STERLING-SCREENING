name: Dependency Review

# Blocks pull requests that introduce dependencies with known vulnerabilities
# or non-compliant licenses. Runs entirely on the PR diff.
on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  dependency-review:
    name: Review dependency changes
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          comment-summary-in-pr: on-failure
          # Deny copyleft/network licenses incompatible with this MIT project.
          deny-licenses: AGPL-3.0, GPL-3.0, LGPL-3.0
