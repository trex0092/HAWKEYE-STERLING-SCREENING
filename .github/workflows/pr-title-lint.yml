name: PR title check

# Enforces Conventional Commits style on pull-request titles so release notes
# and history stay consistent. See CONTRIBUTING.md.
#
# Uses `pull_request` (not `pull_request_target`): the check only reads the PR
# title and fails the job — it needs no write token — so the safer trigger is
# correct here and works on PRs from forks.
on:
  pull_request:
    types: [opened, edited, reopened, synchronize]

permissions:
  contents: read

jobs:
  lint-title:
    name: Validate PR title
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    steps:
      - name: Check Conventional Commits format
        uses: amannn/action-semantic-pull-request@48f256284bd46cdaab1048c3721360e808335d50 # v6.1.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            refactor
            perf
            test
            build
            ci
            chore
            revert
          requireScope: false
          subjectPattern: ^(?![A-Z]).+$
          subjectPatternError: |
            The subject "{subject}" should start with a lowercase letter.
